name: End-to-End Tests
on:
  workflow_call:
jobs:
  test:
    name: Test with Playwright
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.1-noble
    env:
      EMAIL_SECRET: ${{ secrets.EMAIL_SECRET }}
      PIN_SECRET: ${{ secrets.PIN_SECRET }}
      VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Use pre-installed Chromium for miniflare browser binding
        run: |
          # Prefer the Playwright container's pre-installed Chromium over downloading Chrome-for-Testing
          CHROME_PATH=$(find "${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}" -name chrome -type f 2>/dev/null | grep -v "headless\|inspector" | head -1)
          if [ -n "$CHROME_PATH" ]; then
            echo "MINIFLARE_CHROME_EXECUTABLE=$CHROME_PATH" >> "$GITHUB_ENV"
            echo "Using pre-installed Chromium: $CHROME_PATH"
          else
            echo "Pre-installed Chromium not found; miniflare will use Chrome-for-Testing (cached if available)"
          fi
      - name: Write .env for local Worker
        run: |
          printf 'TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA\nEMAIL_SECRET=%s\nPIN_SECRET=%s\n' \
            "$EMAIL_SECRET" "$PIN_SECRET" > .env
      - name: Run Playwright tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
