name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  static-analysis:
    name: Static Analysis
    uses: ./.github/workflows/static-analysis.yml
  unit-tests:
    name: Unit Tests
    needs: [static-analysis]
    uses: ./.github/workflows/unit-tests.yml
  e2e-tests:
    name: End-to-End Tests
    needs: [unit-tests]
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit
